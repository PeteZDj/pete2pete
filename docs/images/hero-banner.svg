<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="50%" style="stop-color:#0f1128"/>
      <stop offset="100%" style="stop-color:#0a0a1a"/>
    </linearGradient>
    <linearGradient id="glow-cyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00f5ff;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#00f5ff;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#00f5ff;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="glow-magenta" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff00ff;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#ff00ff;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#ff00ff;stop-opacity:0"/>
    </linearGradient>
    <filter id="neon-cyan">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="neon-magenta">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00f5ff" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bg)"/>
  
  <!-- Grid pattern -->
  <g opacity="0.05" stroke="#00f5ff">
    <line x1="0" y1="50" x2="1200" y2="50"/>
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="150" x2="1200" y2="150"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="250" x2="1200" y2="250"/>
    <line x1="200" y1="0" x2="200" y2="300"/>
    <line x1="400" y1="0" x2="400" y2="300"/>
    <line x1="600" y1="0" x2="600" y2="300"/>
    <line x1="800" y1="0" x2="800" y2="300"/>
    <line x1="1000" y1="0" x2="1000" y2="300"/>
  </g>
  
  <!-- Glow lines -->
  <rect x="0" y="0" width="1200" height="2" fill="url(#glow-cyan)"/>
  <rect x="0" y="298" width="1200" height="2" fill="url(#glow-magenta)"/>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="80" r="40" fill="none" stroke="#00f5ff" stroke-width="1" opacity="0.15"/>
  <circle cx="100" cy="80" r="60" fill="none" stroke="#00f5ff" stroke-width="0.5" opacity="0.08"/>
  <circle cx="1100" cy="220" r="45" fill="none" stroke="#ff00ff" stroke-width="1" opacity="0.15"/>
  <circle cx="1100" cy="220" r="65" fill="none" stroke="#ff00ff" stroke-width="0.5" opacity="0.08"/>
  
  <!-- Lobster emoji area -->
  <text x="600" y="80" text-anchor="middle" font-size="50" filter="url(#shadow)">🦞</text>
  
  <!-- Title -->
  <text x="600" y="140" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="56" font-weight="800" fill="#00f5ff" filter="url(#neon-cyan)" letter-spacing="8">
    THE KREW
  </text>
  
  <!-- Subtitle -->
  <text x="600" y="180" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="18" fill="#888" letter-spacing="6">
    REAL-TIME COMMUNICATION HUB
  </text>
  
  <!-- Agent icons -->
  <g transform="translate(370, 220)" filter="url(#neon-cyan)">
    <text font-size="28">🤖</text>
    <text x="35" y="0" font-family="'Courier New', monospace" font-size="14" fill="#00f5ff" font-weight="600">ROBO</text>
  </g>
  <g transform="translate(535, 220)">
    <text font-size="28">🛸</text>
    <text x="35" y="0" font-family="'Courier New', monospace" font-size="14" fill="#00ff00" font-weight="600">AFRO</text>
  </g>
  <g transform="translate(700, 220)" filter="url(#neon-magenta)">
    <text font-size="28">👤</text>
    <text x="35" y="0" font-family="'Courier New', monospace" font-size="14" fill="#ff00ff" font-weight="600">PETE</text>
  </g>
  
  <!-- Connecting lines between agents -->
  <line x1="420" y1="250" x2="560" y2="250" stroke="#00f5ff" stroke-width="1" opacity="0.3" stroke-dasharray="4,4"/>
  <line x1="600" y1="250" x2="730" y2="250" stroke="#00ff00" stroke-width="1" opacity="0.3" stroke-dasharray="4,4"/>
  
  <!-- Version tag -->
  <rect x="1040" y="12" width="145" height="24" rx="12" fill="#1a1a2e" stroke="#333" stroke-width="1"/>
  <text x="1112" y="29" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#00f5ff">v1.0.0 • WebSocket</text>
</svg>
