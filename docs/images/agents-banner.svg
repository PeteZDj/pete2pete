<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#0f1128"/>
    </linearGradient>
    <filter id="glow-c">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <rect width="900" height="200" fill="url(#bg2)" rx="12"/>
  
  <!-- Robo Card -->
  <rect x="30" y="20" width="260" height="160" rx="10" fill="#1a1a2e" stroke="#00f5ff" stroke-width="1.5" opacity="0.9"/>
  <rect x="30" y="20" width="260" height="4" rx="2" fill="#00f5ff"/>
  <text x="160" y="65" text-anchor="middle" font-size="36">🤖</text>
  <text x="160" y="95" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#00f5ff">ROBO</text>
  <text x="160" y="118" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="12" fill="#888">Server Infrastructure Bot</text>
  <text x="160" y="140" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#555">Domains • DNS • SSL • Deployments</text>
  <circle cx="60" cy="160" r="4" fill="#00f5ff" opacity="0.5"/>
  <circle cx="75" cy="160" r="4" fill="#00f5ff" opacity="0.3"/>
  <circle cx="90" cy="160" r="4" fill="#00f5ff" opacity="0.15"/>
  
  <!-- Afro Card -->
  <rect x="320" y="20" width="260" height="160" rx="10" fill="#1a1a2e" stroke="#00ff00" stroke-width="1.5" opacity="0.9"/>
  <rect x="320" y="20" width="260" height="4" rx="2" fill="#00ff00"/>
  <text x="450" y="65" text-anchor="middle" font-size="36">🛸</text>
  <text x="450" y="95" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#00ff00">AFRO</text>
  <text x="450" y="118" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="12" fill="#888">Creative Operations Bot</text>
  <text x="450" y="140" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#555">Beats • Videos • Comics • Trading</text>
  <circle cx="350" cy="160" r="4" fill="#00ff00" opacity="0.5"/>
  <circle cx="365" cy="160" r="4" fill="#00ff00" opacity="0.3"/>
  <circle cx="380" cy="160" r="4" fill="#00ff00" opacity="0.15"/>
  
  <!-- Pete Card -->
  <rect x="610" y="20" width="260" height="160" rx="10" fill="#1a1a2e" stroke="#ff00ff" stroke-width="1.5" opacity="0.9"/>
  <rect x="610" y="20" width="260" height="4" rx="2" fill="#ff00ff"/>
  <text x="740" y="65" text-anchor="middle" font-size="36">👤</text>
  <text x="740" y="95" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#ff00ff">PETE</text>
  <text x="740" y="118" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="12" fill="#888">Human Command Center</text>
  <text x="740" y="140" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#555">Orchestrate • Monitor • Control</text>
  <circle cx="640" cy="160" r="4" fill="#ff00ff" opacity="0.5"/>
  <circle cx="655" cy="160" r="4" fill="#ff00ff" opacity="0.3"/>
  <circle cx="670" cy="160" r="4" fill="#ff00ff" opacity="0.15"/>

  <!-- Connection arrows -->
  <line x1="290" y1="100" x2="320" y2="100" stroke="#444" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="580" y1="100" x2="610" y2="100" stroke="#444" stroke-width="1" stroke-dasharray="3,3"/>
</svg>
