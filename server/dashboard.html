<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PeteChat Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f1117; color: #e4e4e7; padding: 24px;
      line-height: 1.6;
    }
    h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 8px; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .status-pill {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 12px; border-radius: 9999px; font-size: 0.75rem; font-weight: 500;
      background: #1a1d27; border: 1px solid #2a2d37;
    }
    .status-pill.connected { border-color: #22c55e40; color: #4ade80; }
    .status-pill.disconnected { border-color: #ef444440; color: #f87171; }
    .dot { width: 8px; height: 8px; border-radius: 50%; }
    .dot.green { background: #22c55e; animation: pulse 2s ease-in-out infinite; }
    .dot.red { background: #ef4444; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 24px; }
    .card {
      background: #1a1d27; border: 1px solid #2a2d37; border-radius: 12px; padding: 16px;
    }
    .card h3 { font-size: 0.85rem; color: #71717a; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; }
    .agent-status { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
    .agent-name { font-weight: 600; font-size: 1rem; }
    .agent-meta { font-size: 0.75rem; color: #71717a; }
    .messages-container {
      background: #1a1d27; border: 1px solid #2a2d37; border-radius: 12px;
      padding: 16px; max-height: 500px; overflow-y: auto;
    }
    .msg {
      padding: 8px 12px; margin-bottom: 6px; border-radius: 8px;
      font-size: 0.85rem; background: #22252f;
    }
    .msg .meta { font-size: 0.7rem; color: #71717a; }
    .msg .from { font-weight: 600; color: #a1a1aa; }
    .msg .from.robo { color: #60a5fa; }
    .msg .from.afro { color: #c084fc; }
    .msg .from.pete { color: #34d399; }
    .msg.event { border-left: 3px solid #f59e0b; }
    .input-row { display: flex; gap: 8px; margin-top: 16px; }
    .input-row input {
      flex: 1; padding: 10px 14px; background: #22252f; border: 1px solid #2a2d37;
      border-radius: 8px; color: #e4e4e7; font-size: 0.85rem; outline: none;
    }
    .input-row input:focus { border-color: #3b82f6; }
    .input-row button {
      padding: 10px 20px; background: #3b82f6; color: white; border: none;
      border-radius: 8px; font-weight: 500; cursor: pointer; font-size: 0.85rem;
    }
    .input-row button:hover { background: #2563eb; }
    @media (max-width: 768px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>PeteChat Dashboard</h1>
    <div class="status-pill disconnected" id="connPill">
      <span class="dot red" id="connDot"></span>
      <span id="connText">Connecting...</span>
    </div>
  </div>

  <div class="grid">
    <div class="card">
      <h3>Robo 🤖</h3>
      <div class="agent-status"><span class="dot" id="robo-dot"></span><span class="agent-name">Robo</span></div>
      <div class="agent-meta" id="robo-meta">—</div>
    </div>
    <div class="card">
      <h3>Afro 🛸</h3>
      <div class="agent-status"><span class="dot" id="afro-dot"></span><span class="agent-name">Afro</span></div>
      <div class="agent-meta" id="afro-meta">—</div>
    </div>
    <div class="card">
      <h3>Pete 👤</h3>
      <div class="agent-status"><span class="dot" id="pete-dot"></span><span class="agent-name">Pete</span></div>
      <div class="agent-meta" id="pete-meta">—</div>
    </div>
  </div>

  <h3 style="margin-bottom: 8px; font-size: 0.85rem; color: #71717a; text-transform: uppercase; letter-spacing: 0.05em;">Messages</h3>
  <div class="messages-container" id="messages"></div>

  <div class="input-row">
    <input type="text" id="msgInput" placeholder="Type a message as Pete..." />
    <button onclick="sendMessage()">Send</button>
  </div>

  <script>
    const WS_URL = `ws://${location.host}/ws?client=pete`;
    const messagesDiv = document.getElementById('messages');
    let ws;
    let reconnectTimer;
    let reconnectDelay = 1000;

    function connect() {
      ws = new WebSocket(WS_URL);
      ws.onopen = () => {
        setConnected(true);
        reconnectDelay = 1000;
      };
      ws.onclose = () => {
        setConnected(false);
        reconnectTimer = setTimeout(connect, reconnectDelay);
        reconnectDelay = Math.min(reconnectDelay * 1.5, 10000);
      };
      ws.onerror = () => {};
      ws.onmessage = (e) => {
        try {
          const data = JSON.parse(e.data);
          if (data.type === 'init') {
            messagesDiv.innerHTML = '';
            (data.messages || []).forEach(addMessage);
            updateAgents(data.agents);
          } else if (data.type === 'pong') {
            // ignore
          } else {
            addMessage(data);
            if (data.type && (data.type.endsWith('_online') || data.type.endsWith('_offline'))) {
              fetch('/krew/status').then(r => r.json()).then(d => updateAgents(d.agents));
            }
          }
        } catch {}
      };
    }

    function setConnected(ok) {
      const pill = document.getElementById('connPill');
      const dot = document.getElementById('connDot');
      const text = document.getElementById('connText');
      pill.className = 'status-pill ' + (ok ? 'connected' : 'disconnected');
      dot.className = 'dot ' + (ok ? 'green' : 'red');
      text.textContent = ok ? 'Connected' : 'Reconnecting...';
    }

    function updateAgents(agents) {
      if (!agents) return;
      ['robo', 'afro', 'pete'].forEach(a => {
        const dot = document.getElementById(a + '-dot');
        const meta = document.getElementById(a + '-meta');
        if (agents[a]) {
          dot.className = 'dot ' + (agents[a].online ? 'green' : 'red');
          meta.textContent = agents[a].lastSeen ? 'Last seen: ' + new Date(agents[a].lastSeen).toLocaleString() : '—';
        }
      });
    }

    function addMessage(msg) {
      const div = document.createElement('div');
      const isEvent = msg.type && msg.type !== 'message' && msg.type !== 'code';
      div.className = 'msg' + (isEvent ? ' event' : '');
      const text = msg.payload?.message || msg.type || '—';
      div.innerHTML = `<span class="from ${msg.from || ''}">${msg.from || 'system'}</span>: ${escapeHtml(text)} <span class="meta">${new Date(msg.timestamp).toLocaleTimeString()}</span>`;
      messagesDiv.appendChild(div);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function escapeHtml(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    function sendMessage() {
      const input = document.getElementById('msgInput');
      const text = input.value.trim();
      if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
      ws.send(JSON.stringify({
        type: 'message',
        from: 'pete',
        to: 'all',
        payload: { message: text },
        timestamp: new Date().toISOString()
      }));
      input.value = '';
    }

    document.getElementById('msgInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') sendMessage();
    });

    // Heartbeat
    setInterval(() => {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'pete_heartbeat', from: 'pete', to: 'all', payload: {}, timestamp: new Date().toISOString() }));
      }
    }, 60000);

    // Fallback polling
    setInterval(async () => {
      if (!ws || ws.readyState !== WebSocket.OPEN) {
        try {
          const res = await fetch('/messages?limit=50');
          const data = await res.json();
          messagesDiv.innerHTML = '';
          (data.messages || []).forEach(addMessage);
        } catch {}
      }
    }, 5000);

    connect();
  </script>
</body>
</html>
